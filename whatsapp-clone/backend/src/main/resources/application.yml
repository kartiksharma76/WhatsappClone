server:
  port: 8080

  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: mysecretkeymysecretkey1234567890mysecretkeymysecretkey1234567890
  expiration: 86400000
  refresh-expiration: 604800000

file:
  upload-dir: ./uploads
  max-size: 52428800

  allowed-types: image/jpeg,image/png,image/gif,image/webp,video/mp4,audio/mpeg,audio/wav,audio/ogg,application/pdf,application/msword

websocket:
  endpoint: /api/ws
  allowed-origins: http://localhost:3000,http://localhost:5173

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

  show-actuator: false

logging:
  level:
    com.chatapp: DEBUG
    org.springframework.security: INFO
    org.springframework.web.socket: INFO

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

  file:
    name: logs/chatapp.log


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: when_authorized

